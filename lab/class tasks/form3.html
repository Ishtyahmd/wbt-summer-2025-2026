<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="">
</head>
<body>
    <form class="form-card">
        <div class="card-header">
            <h1 class="Heading">Create your account</h2>
            <p class=" minitext">join us in a couple of steps</p>
        </div>

        <div class="form-body">

            <div class="field">
                <label for="name">Full name:</label>
                <input type="text" name="name" id="Fullname" placeholder="Full Name">
            </div>

            <div class="field">
                <label for="dob">Age</label>
                <input type="number" id="age" placeholder="20">
            </div>

            <div class="field">
                <label for="dob">Date of birth</label>
                <input type="date" id="dob" value="2026-06-20">
            </div>

            <div class="field">
                <label for="email">Email address</label>
                <input type="email" id="mail" placeholder="example@gmail.com">
            </div>

            <div class="field">
                <label for="password">Password</label>
                <input type="password" id="pwd" placeholder="********">
            </div>

            <div class="radio">
            <label><input type="radio" name="contact" value="mail"> Email</label>
            <label><input type="radio" name="contact" value="phone">Phone</label>
            <label><input type="radio" name="contact" value="SMS">SMS</label>
            </div>

            <div class="buttons">
                <button type="submit" class="btn-primary">Submit</button>
                <button type="reset" class="btn-secondry">Reset</button>
            </div>
        </div>
    </form>
</body>
</html>
