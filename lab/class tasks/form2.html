<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="">
</head>
<body>
    <form class="form-card">
        <div class="card-header">
            <h1 class="Heading">Registration</h2>
            <p class=" minitext">please complete all fields below</p>
        </div>
        <hr>

        <div class="form-body">

            <div class="field">
                <label for="name">Full name:</label>
                <input type="text" name="name" id="Fullname" placeholder="Full Name">
            </div>

            <div class="postal">
                <label for="postal-code">Postal Code:</label>
                <input type="number" id="postal-code" placeholder="1001">
            </div>

            <div class="field">
                <label for="dob">Date of birth</label>
                <input type="date" id="dob" value="2026-06-20">
            </div>

            <div class="field">
                <label for="email">Email address</label>
                <input type="email" id="mail" placeholder="example@gmail.com">
            </div>

            <div class="field">
                <label for="password">Password</label>
                <input type="password" id="pwd" placeholder="********">
            </div>

            <div class="field">
                <label for="country">Country</label>
                <select name="country" id="cntry">
                    <option value="" selected disabled>--Select a country--</option>
                    <option value="bd">Bangladesh</option>
                    <option value="aus">Australia</option>
                    <option value="uk">United Kingdom</option>
                    <option value="esp">Spain</option>
                    <option value="usa">United States of America</option>
                </select>
            </div>

            <div class="buttons">
                <button type="submit" class="btn-primary">Submit</button>
                <button type="reset" class="btn-secondary">Reset</button>
            </div>
        </div>
    </form>
</body>
</html>
